<button [routerLink]="'../../'" type="button"  class="btn btn-primary">Back</button>
<div *ngIf="question" class="container">
  <div class="d-flex align-items-center justify-content-center">
    <img [src]="'http://localhost:3000/images/' + question.image" alt="Place image title">
  </div>
  <div class="d-flex align-items-center justify-content-center">
    {{question.text}}
  </div>
  <div class="d-flex align-items-center justify-content-center">
    {{question.answer1}}
  </div>
  <div class="d-flex align-items-center justify-content-center">
    {{question.answer2}}
  </div>
  <div class="d-flex align-items-center justify-content-center">
    {{question.answer3}}
  </div>
  <div class="d-flex align-items-center justify-content-center">
    Raspuns/Raspunsuri corecte: {{question.correctAnswer}}
  </div>
</div>
